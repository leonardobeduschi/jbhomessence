<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando... - JB Home Essence</title>
    <meta name="robots" content="noindex">
    <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var categoria = params.get('categoria');
      var tipo = params.get('tipo');
      var destino = '../index.html';
      if (categoria) {
        destino = 'fragrancia/' + encodeURIComponent(categoria) + '/';
      } else if (tipo) {
        destino = 'tipo/' + encodeURIComponent(tipo) + '/';
      }
      window.location.replace(destino);
    })();
    </script>
</head>
<body>
    <p>Redirecionando para a página atualizada... Se não for redirecionado, <a href="../index.html">clique aqui</a>.</p>
</body>
</html>
